---
- name: Wait for any ongoing apt operations to finish
  become: true
  shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
  timeout: 300

- name: Purge conflicting Docker packages and Python libraries
  become: true
  shell: |
    pip3 uninstall -y docker docker-compose docker-py requests
    apt-get purge -y python3-docker python3-docker-compose containerd runc
  ignore_errors: yes

- name: Install dependencies for Docker Repo
  become: true
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
    state: present
    update_cache: yes

- name: Add Docker’s official GPG key
  become: true
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker Repository
  become: true
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker Engine and Compose Plugin
  become: true
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: latest
    update_cache: yes

- name: Install gsutil
  become: true
  apt:
    name: google-cloud-sdk
    state: present

- name: Forcefully remove old Docker python libraries
  become: true
  pip:
    name: [docker, docker-py, docker-compose]
    state: absent
    extra_args: --break-system-packages
  ignore_errors: yes

- name: Install compatible Docker python libraries
  become: true
  pip:
    name:
      - docker==4.4.4
      - docker-compose==1.29.2
    state: present
    extra_args: --break-system-packages
