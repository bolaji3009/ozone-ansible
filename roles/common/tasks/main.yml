---
- name: Install prerequisite packages
  apt:
    name:
      - docker.io
      - apt-transport-https
      - python3-pip
    state: present
    update_cache: yes

- name: Install Docker Compose binary
  get_url:
    url: https://github.com/docker/compose/releases/download/1.29.2/docker-compose-Linux-x86_64
    dest: /usr/local/bin/docker-compose
    mode: 'u+x,g+x,o+x'

- name: Add Google Cloud SDK apt key
  apt_key:
    url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    state: present

- name: Add Google Cloud SDK repository
  apt_repository:
    repo: deb https://packages.cloud.google.com/apt cloud-sdk main
    state: present
    update_cache: yes

- name: Install gsutil
  apt:
    name: google-cloud-sdk
    state: present

- name: Ensure old Docker python libraries are removed
  pip:
    name:
      - docker
      - docker-compose
    state: absent

- name: Install compatible Docker python libraries
  pip:
    name:
      - docker==4.4.4
      - docker-compose==1.29.2
    state: present
