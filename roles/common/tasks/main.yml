---
- name: Wait for apt to finish
  raw: 'while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done;'
  changed_when: false

- name: Install dependencies for Docker Repo
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - ca-certificates
    - curl
    - gnupg
    - lsb-release

- name: Add Docker’s official GPG key
  apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present

- name: Add Docker Repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/debian bookworm stable
    state: present

- name: Install Docker Engine
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-compose-plugin

- name: Ensure hello user is in the docker group
  user:
    name: hello
    groups: docker
    append: yes

- name: Add Google Cloud SDK apt key
  apt_key:
    url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    state: present

- name: Add Google Cloud SDK repository
  apt_repository:
    repo: deb https://packages.cloud.google.com/apt cloud-sdk main
    state: present

- name: Install gsutil
  apt:
    name: google-cloud-sdk
    state: present
    update_cache: yes
