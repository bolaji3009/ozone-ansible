---
- name: Clone the repository
  git:
    repo: https://github.com/bolaji3009/ozone.git
    dest: "{{ integration_path }}"
    version: main

- name: Generate the .env file
  template:
    src: env.j2
    dest: "{{ integration_path }}/.env"
    mode: '0644'

- name: Stop any existing services from root compose
  shell: "docker compose down --remove-orphans"
  args:
    chdir: "{{ integration_path }}"
  ignore_errors: true

- name: Deploy integration services using shell
  become: true
  shell:
    cmd: "docker compose up -d rabbitmq imis-connect"
    chdir: "{{ integration_path }}"
