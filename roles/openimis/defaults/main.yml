# This file contains the default variables for the openimis role.
---
openimis_path: /home/hello/openimis-dist
openimis_env_vars:
  # --- General Project Settings ---
  PROJECT_NAME: "openimis"
  DOMAIN: "localhost"
  HOSTS: "localhost,127.0.0.1"
  HTTP_PORT: "80"
  HTTPS_PORT: "443"

  # --- Database Configuration ---
  DB_ENGINE: "django.db.backends.postgresql"
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "openimis"
  DB_USER: "openimis"
  DB_PASSWORD: "secure_password_here"
  POSTGRES_USER: "openimis"
  POSTGRES_PASSWORD: "secure_password_here"
  POSTGRES_DB: "openimis"
  DEMO_DATASET: "true"

  # --- Security ---
  SECRET_KEY: "a-very-secret-and-random-string-goes-here"
  DEBUG: "False"
  ALLOWED_HOSTS: "*"

  # --- Redis & Caching ---
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  CACHE_URL: "redis://redis:6379/1"
  CHANNELS_HOST: "redis"
  REDIS_PASSWORD: "myredispassword"

  # --- Search & Gateway ---
  GATEWAY_PORT: "8000"
  OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
  OPENSEARCH_BASIC_TOKEN: "Basic YWRtaW46YWRtaW4=" # admin:admin
  OPENSEARCH_ADMIN: "admin"
  OPENSEARCH_PASSWORD: "mysecretpassword"

  # --- Image Tags ---
  DB_TAG: "25.10"
  BE_TAG: "25.10"
  FE_TAG: "25.10"
  GW_TAG: "25.10"
  
  # --- Other ---
  OPENIMIS_FE_CONF_JSON: "{}"
  CACHE_BACKEND: "django_redis.cache.RedisCache"
  CACHE_OPTIONS: ""
  ACCEPT_EULA: "Y"
  WORKER_REPLICAS: "1"
