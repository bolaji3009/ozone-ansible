---
- name: Clone the openimis-dist repository
  git:
    repo: https://github.com/openimis/openimis-dist_dkr.git
    dest: /home/ansible/openimis-dist
    version: release/25.10

- name: Start the openIMIS services
  docker_compose:
    project_src: /home/ansible/openimis-dist
    files:
      - docker-compose.yml
    services:
      - openimis-db
      - openimis-be
      - openimis-fe
      - redis
      - openimis-opensearch
      - openimis-opensearch-dashboards
    state: present
