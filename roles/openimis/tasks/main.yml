---
- name: Clone the openimis-dist repository
  git:
    repo: https://github.com/openimis/openimis-dist_dkr.git
    dest: /home/hello/openimis-dist
    version: release/25.10
    force: yes

- name: Create required .env file
  copy:
    dest: /home/hello/openimis-dist/.env
    content: |
      DB_PASSWORD=mysecretpassword
      DB_NAME=openimis
      DB_USER=openimis
      SECRET_KEY=mysecretkey
      DOMAIN=localhost

- name: Create required .env.openSearch file
  copy:
    dest: /home/hello/openimis-dist/.env.openSearch
    content: |
      OPENSEARCH_PASSWORD=mysecretpassword

- name: Start Redis and DB first
  shell: docker compose up -d redis db
  args:
    chdir: /home/hello/openimis-dist

- name: Wait for DB to be healthy
  shell: docker compose ps db | grep -q 'healthy'
  args:
    chdir: /home/hello/openimis-dist
  retries: 12
  delay: 5
  register: db_health
  until: db_health.rc == 0

- name: Start the rest of the services
  shell: docker compose up -d
  args:
    chdir: /home/hello/openimis-dist
