---
- name: Clone the openimis-dist repository
  git:
    repo: https://github.com/openimis/openimis-dist_dkr.git
    dest: "{{ openimis_path }}"
    version: release/25.10
    force: yes

- name: Generate the .env file with correct multi-line formatting
  template:
    src: env.j2
    dest: "{{ openimis_path }}/.env"
    mode: '0600'

- name: Validate .env file format (Fail if single-line)
  shell: "grep -c '=' {{ openimis_path }}/.env"
  register: line_count
  failed_when: line_count.stdout|int < 5
  changed_when: false

- name: Start Redis and DB first
  shell: docker compose up -d redis db
  args:
    chdir: "{{ openimis_path }}"

- name: Wait for Redis to be healthy before proceeding
  community.docker.docker_container_info:
    name: openimis-dist-redis-1
  register: redis_container
  until: redis_container.container.State.Health.Status == "healthy"
  retries: 15
  delay: 10

- name: Wait for DB to be healthy before proceeding
  community.docker.docker_container_info:
    name: openimis-dist-db-1
  register: db_container
  until: db_container.container.State.Health.Status == "healthy"
  retries: 15
  delay: 10

- name: Start the rest of the openIMIS services
  shell: docker compose up -d --remove-orphans
  args:
    chdir: "{{ openimis_path }}"
  register: compose_out
