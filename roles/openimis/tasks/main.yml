---
- name: Clone the openimis-dist repository
  git:
    repo: https://github.com/openimis/openimis-dist_dkr.git
    dest: /home/ansible/openimis-dist
    version: release/25.10
    force: yes

- name: Create .env file
  copy:
    dest: "/home/ansible/openimis-dist/.env"
    content: |
      DB_PASSWORD=mysecretpassword
      DB_NAME=openimis
      DB_USER=openimis
      SECRET_KEY=mysecretkey
      DOMAIN=localhost

- name: Create .env.openSearch file
  copy:
    dest: "/home/ansible/openimis-dist/.env.openSearch"
    content: |
      OPENSEARCH_PASSWORD=mysecretpassword

- name: Fix invalid restart policy in compose.base.yml
  shell: 'sed -i ''s/restart: no/restart: "no"/g'' /home/ansible/openimis-dist/compose.base.yml'

- name: Start the openIMIS services using shell
  shell: docker-compose up -d
  args:
    chdir: /home/ansible/openimis-dist
