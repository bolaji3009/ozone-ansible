---
- name: Take down any running services to ensure a clean start
  shell: docker compose down -v --remove-orphans
  args:
    chdir: "{{ openimis_path }}"
  ignore_errors: true

- name: Start all services
  shell: docker compose up -d
  args:
    chdir: "{{ openimis_path }}"
  register: compose_up_result

- name: Display final container status
  debug:
    msg: "{{ item }}"
  loop: "{{ compose_up_result.stdout_lines }}"
