---
- name: Clone the repository
  git:
    repo: https://github.com/bolaji3009/ozone.git
    dest: /home/ansible/ozone
    version: main

- name: Start the hcwathome services
  docker_compose:
    project_src: /home/ansible/ozone
    files:
      - docker-compose.yml
    services:
      - hcwathome-db
      - hcwathome-be
      - hcwathome-fe
    state: present
