---
- name: Clone the repository
  git:
    repo: https://github.com/bolaji3009/ozone.git
    dest: "{{ hcwathome_path }}"
    version: main

- name: Generate the .env file
  template:
    src: env.j2
    dest: "{{ hcwathome_path }}/.env"
    mode: '0644'

- name: Ensure docker-compose files are present
  copy:
    src: "/mnt/data/ozone/ozone/{{ item }}"
    dest: "{{ hcwathome_path }}/{{ item }}"
    mode: '0644'
  loop:
    - docker-compose.openimis-hcw.yml
    - docker-compose.override.yml

- name: Ensure data directories exist
  file:
    path: "{{ hcwathome_path }}/data/{{ item }}"
    state: directory
    owner: hello
    group: hello
  loop:
    - mongo
    - certbot
    - attachments

- name: Stop any existing services from root compose
  shell: "docker compose -f docker-compose.yml down --remove-orphans"
  args:
    chdir: "{{ hcwathome_path }}"
  ignore_errors: true

- name: Start the hcwathome services
  shell: "docker compose -f docker-compose.openimis-hcw.yml up -d coturn mediasoup mongo patient doctor admin backend redis"
  args:
    chdir: "{{ hcwathome_path }}"
