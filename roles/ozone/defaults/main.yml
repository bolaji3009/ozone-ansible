---
ozone_path: /home/hello/ozone
ozone_env_vars:
  # General
  PROJECT_NAME: "ozone"
  DOMAIN: "34.26.137.28"
  HOSTS: "localhost,127.0.0.1,34.26.137.28"
  
  # OpenMRS (Fixed variables to match docker-compose.yml logic)
  OMRS_DB_USER: "openmrs"
  OMRS_DB_PASSWORD: "openmrs_password"
  OPENMRS_DB_USER: "openmrs"
  OPENMRS_DB_PASSWORD: "openmrs_password"
  MYSQL_ROOT_PASSWORD: "openmrs_root_password"
  
  # Odoo
  ODOO_DATABASE: "odoo"
  ODOO_DB_USER: "odoo"
  ODOO_DB_PASSWORD: "odoo_password"
  POSTGRES_DB_HOST: "odoo-db"
  ODOO_FILESTORE: "odoo-filestore"
  ODOO_CONFIG_CHECKSUMS_PATH: "odoo-checksums"
  
  # Senaite
  SENAITE_DB_NAME: "senaite"
  SENAITE_DB_USER: "senaite"
  SENAITE_DB_PASSWORD: "senaite_password"
  SENAITE_DB_HOST: "senaite-db"
  SITE: "ozone"
  SENAITE_ADMIN_USER: "admin"
  SENAITE_ADMIN_PASSWORD: "admin_password"
  SENAITE_BLOBSTORAGE_PATH: "senaite-blobstorage"
  
  # Keycloak
  KEYCLOAK_DB: "keycloak"
  KEYCLOAK_DB_USER: "keycloak"
  KEYCLOAK_DB_PASSWORD: "keycloak_password"
  KEYCLOAK_USER: "admin"
  KEYCLOAK_PASSWORD: "admin_password"
  KEYCLOAK_CONFIG_PATH: "/home/hello/ozone/configs/keycloak"

  # Superset (Moved from Integration)
  SUPERSET_DB_NAME: "superset"
  SUPERSET_DB_USER: "superset"
  SUPERSET_DB_PASSWORD: "superset_password"
  SUPERSET_SECRET_KEY: "another_secret_key"
  SUPERSET_LOAD_EXAMPLES: "no"

  # OpenMRS Performance
  JAVA_OPTS: "-Xmx2g -Xms512m"
