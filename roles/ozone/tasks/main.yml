---
- name: Clone the repository
  git:
    repo: https://github.com/bolaji3009/ozone.git
    dest: /home/ansible/ozone
    version: main

- name: Start the Ozone HIS services
  docker_compose:
    project_src: /home/ansible/ozone
    files:
      - docker-compose.yml
      - docker-compose.override.yml
    services:
      - openmrs-db
      - openmrs
      - odoo-db
      - odoo
      - senaite-db
      - senaite
      - keycloak-db
      - keycloak
    state: present
