---
- name: Clone the repository
  git:
    repo: https://github.com/bolaji3009/ozone.git
    dest: "{{ ozone_path }}"
    version: main
    force: yes

- name: Generate the .env file
  template:
    src: env.j2
    dest: "{{ ozone_path }}/.env"
    mode: '0644'

- name: Ensure odoo.conf is present
  copy:
    src: /mnt/data/ozone/ozone/odoo.conf
    dest: "{{ ozone_path }}/odoo.conf"
    mode: '0644'

- name: Ensure openmrs-distro.properties is present
  copy:
    src: /mnt/data/ozone/ozone/distro/target/distro-emr-configuration/sdk-distro/web/openmrs-distro.properties
    dest: "{{ ozone_path }}/distro/target/distro-emr-configuration/sdk-distro/web/openmrs-distro.properties"
    mode: '0644'

- name: Ensure setenv.sh is present
  copy:
    src: /mnt/data/ozone/ozone/openmrs/setenv.sh
    dest: "{{ ozone_path }}/openmrs/setenv.sh"
    mode: '0644'

- name: Nuke existing services and volumes (Targeted Reset)
  shell: "docker compose down -v --remove-orphans"
  args:
    chdir: "{{ ozone_path }}"
  tags: [ 'never', 'reset-ozone-db' ]

- name: Stop any existing services from root compose
  shell: "docker compose down --remove-orphans"
  args:
    chdir: "{{ ozone_path }}"
  ignore_errors: true

- name: Deploy core HIS and Superset services
  become: true
  shell:
    cmd: "docker compose up -d openmrs-db openmrs odoo-db odoo senaite-db senaite keycloak-db keycloak superset-db superset"
    chdir: "{{ ozone_path }}"
  environment:
    JAVA_OPTS: "-Xmx2g -Xms512m"
