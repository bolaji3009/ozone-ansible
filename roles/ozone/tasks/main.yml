---
- name: Download the Ozone HIS distribution artifact from GCS
  command: gsutil cp gs://ozone-artifacts/ozone-distro.zip /home/ansible/ozone-distro.zip

- name: Create the deployment directory
  file:
    path: /home/ansible/ozone-dist
    state: directory

- name: Unzip the Ozone HIS distribution
  unarchive:
    src: /home/ansible/ozone-distro.zip
    dest: /home/ansible/ozone-dist
    remote_src: yes

- name: Start the Ozone HIS services
  docker_compose:
    project_src: /home/ansible/ozone-dist
    state: present
